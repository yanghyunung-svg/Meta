<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>Upbit 호가 조회</title>
    <style>
        @keyframes flash-blue {
            0% { background-color: #d0e0ff; }
            100% { background-color: #f0f4ff; }
        }
        @keyframes flash-red {
            0% { background-color: #ffd0d0; }
            100% { background-color: #fff0f0; }
        }
        .ask-row.update { animation: flash-blue 0.4s ease-out; }
        .bid-row.update { animation: flash-red 0.4s ease-out; }

        /* 팝업 컨테이너에 스크롤 적용 */
        #popupContainer {
            height: 100vh; /* 화면 꽉 차게 */
            overflow-y: auto;
            position: relative;
        }
    </style>
    <link rel="stylesheet" href="/css/upbit.css">
    <script src="/js/mainLayout.js" defer></script>
    <script src="/js/commonUtils.js" defer></script>
</head>
<body>

<div class="container" >
    <div class="popupHeadContainer">
        <h2 style="margin:0;"> ✅ 호가 조회</h2>
        <div class="button-group">
            <button id="btnSearch" type="button" class="hidden">조회</button>
            <button id="btnClose" type="button" class="btn">닫기</button>
        </div>
    </div>

    <div class="popupBodyContainer">
        <table class="search-table">
            <tr>
                <td width="300px">
                    <select id="market" name="market" class="search-select">
                    </select>
                </td>
                <td>
                    <span id="lastUpdateTime" style="color: #888;"></span>
                </td>
            </tr>
        </table>
    </div>

    <div class="popupTableContainer">
        <table class="data-table" id="mainTable">
            <thead>
            <tr><th width="15%">매도 잔량</th>
                <th width="15%">호가 (KRW)</th>
                <th width="15%">매수 잔량</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
    let socket = null;
    let marketMap = {};
    window.isFirstLoad = true; // 마켓 변경 시 중앙 정렬을 위한 플래그

    const tableBody = document.querySelector("#mainTable tbody");
    const marketSelect = document.getElementById('market');
    const container = document.getElementById('popupContainer');

    const urlParams = new URLSearchParams(window.location.search);
    const marketCode = urlParams.get('market');

    // 1. 마켓 리스트 초기화 (Local Storage 활용)
    async function initMarketList() {
        try {
            const savedData = localStorage.getItem('upbit_markets');
            if (!savedData) return;

            const markets = JSON.parse(savedData);
            const filtered = markets.filter(m => m.market.startsWith("KRW-"));
            filtered.sort((a, b) => a.korean_name.localeCompare(b.korean_name));

            filtered.forEach(m => {
                const option = document.createElement('option');
                option.value = m.market;
                option.textContent = `${m.korean_name} (${m.market})`;
                marketSelect.appendChild(option);
            });

            // 초기 마켓 설정 및 연결
            if (marketCode) marketSelect.value = marketCode;
            connectWS(marketSelect.value);
        } catch (err) {
            console.error("마켓 로드 실패", err);
        }
    }

    // 2. WebSocket 연결 및 데이터 수신
    function connectWS(market) {
        if (socket) socket.close(); // 기존 연결 종료

        socket = new WebSocket("wss://api.upbit.com/websocket/v1");
        socket.binaryType = 'blob';

        socket.onopen = () => {
            const query = [
                { "ticket": "upbit-hoga-viewer" },
                { "type": "orderbook", "codes": [market] }
            ];
            socket.send(JSON.stringify(query));
        };

        socket.onmessage = async (event) => {
            const text = await event.data.text();
            const data = JSON.parse(text);
            renderTable(data);
            updateTime();
        };
    }

    // 3. 테이블 렌더링 및 시각 효과
    function renderTable(data) {
        if (!data) return;

          const formatPrice = (val) => {
              const num = Number(val);
              return (num > 1) ? num.toLocaleString() : (num || 0);
            };


        // 상위 18개만 추출
        const units = data.orderbook_units.slice(0,20);
        const maxSize = Math.max(...units.map(u => Math.max(u.ask_size, u.bid_size)));

        // 매도 호가 (18개, 역순)
        const askHtml = [...units].reverse().map(unit => {
            const ratio = (unit.ask_size / maxSize) * 100;
            return `
                <tr class="ask-row">
                    <td style="text-align:right; padding-right:10px; position:relative;">
                        <div style="position:absolute; right:0; top:0; bottom:0; width:${ratio}%; background:rgba(0,81,199,0.1);"></div>
                        <span style="position:relative; color:#0051c7;">${unit.ask_size.toLocaleString(undefined, {minimumFractionDigits: 3})}</span>
                    </td>
                    <td style="text-align:center; font-weight:bold; background-color: #e6eefd; border:1px solid #fff;">${formatPrice(unit.ask_price)}</td>
                    <td style="text-align:center; color:#ccc;">-</td>
                </tr>`;
        }).join('');

        // 매수 호가 (18개, 정순)
        const bidHtml = units.map(unit => {
            const ratio = (unit.bid_size / maxSize) * 100;
            return `
                <tr class="bid-row">
                    <td style="text-align:center; color:#ccc;">-</td>
                    <td style="text-align:center; font-weight:bold; background-color: #fde6e6; border:1px solid #fff;">${formatPrice(unit.bid_price)}</td>
                    <td style="text-align:right; padding-right:10px; position:relative;">
                        <div style="position:absolute; left:0; top:0; bottom:0; width:${ratio}%; background:rgba(214,0,0,0.1);"></div>
                        <span style="position:relative; color:#d60000;">${unit.bid_size.toLocaleString(undefined, {minimumFractionDigits: 3})}</span>
                    </td>
                </tr>`;
        }).join('');

        tableBody.innerHTML = askHtml + bidHtml;

        if (window.isFirstLoad) {
            scrollToSpread();
            window.isFirstLoad = false;
        }
    }

    // 4. 유틸리티 함수들
    function scrollToSpread() {
        const firstBid = tableBody.querySelector('.bid-row');
        if (firstBid && container) {
            const target = firstBid.offsetTop - (container.offsetHeight / 2) + (firstBid.offsetHeight / 2);
            container.scrollTo({ top: target, behavior: 'smooth' });
        }
    }

    function updateTime() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('ko-KR', {
            hour12: false,           // 24시간 형식 (선택)
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            fractionalSecondDigits: 3 // 3자리 밀리초 표시
        });

        document.getElementById('lastUpdateTime').textContent = ` ${timeString}`;
    }

    // 5. 이벤트 리스너
    marketSelect.addEventListener('change', (e) => {
        window.isFirstLoad = true;
        connectWS(e.target.value);
    });

    document.getElementById("btnClose").addEventListener("click", () => window.close());

    // 실행 시작
    initMarketList();
});
</script>
</body>
</html>
