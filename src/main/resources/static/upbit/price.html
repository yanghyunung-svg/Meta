<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>Upbit 현재가 조회</title>
    <link rel="stylesheet" href="/css/upbit.css">
    <script src="/js/mainLayout.js" defer></script>
    <script src="/js/sideLayout.js" defer></script>
    <script src="/js/commonUtils.js" defer></script>
</head>
<body>
<div class="container">
    <div id="topbarContainer"></div>
    <div id="sidebarContainer"></div>

    <div class="mainHeadContainer">
        <h2 style="margin:0;"> ✅ 업비트 현재가 대시보드</h2>
        <div class="button-group">
            <button id="btnSearch" type="button" class="hidden">조회</button>
            <button id="btnExcel" type="button" class="btn">Excel</button>
        </div>
    </div>

    <div class="mainBodyContainer">
        <form id="mainForm">
            <table class="search-table">
                <tr>
                    <td width="200">
                        <select id="unit" name="unit" class="search-select">
                            <option value="KRW-" selected>KRW 마켓</option>
                            <option value="BTC-">BTC 마켓</option>
                            <option value="USDT-">USDT 마켓</option>
                        </select>
                    </td>
                    <td width="300">
                        <select id="market" name="market" class="search-select">
                            <option value="ALL">전체 보기</option>
                        </select>
                    </td>
                    <td style="padding-left: 10px;">
                        <span id="lastUpdateTime" style="color: #666; font-size: 0.9em;"></span>
                    </td>
                </tr>
            </table>
        </form>
    </div>

    <div class="mainTableContainer">
        <table class="data-table" id="mainTable">
            <thead>
            <tr>
                <th width="50">No</th>
                <th class="left">마켓</th>
                <th class="left">마켓명</th>
                <th class="right">현재가</th>
                <th class="right">전일가</th>
                <th class="right">전일대비</th>
                <th class="right">변동률  </th>
                <th class="right">고가</th>
                <th class="right">저가</th>
                <th>52주 최고</th>
                <th class="right"> 52주 최고가</th>
                <th>52주 최저</th>
                <th class="right"> 52주 최저가</th>
                <th class="right">거래대금(24h)</th>
                <th>시간</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
     let socket = null;
     let marketMap = {};
     let currentTickers = {}; // 실시간 데이터 저장소
     let isRendering = false; // Throttle용 플래그
        let changedMarkets = new Set(); // 변경된 마켓 ID를 임시 저장

     const tableBody = document.querySelector("#mainTable tbody");
     const marketSelect = document.getElementById('market');
     const unitSelect = document.getElementById('unit');

     // [1] Throttle 렌더링 함수
     // 데이터가 들어올 때마다 실행하지 않고, 브라우저 주기에 맞춰 1번만 실행
     function throttledRender() {
         if (isRendering) return; // 이미 그리려고 대기 중이면 무시
         isRendering = true;

         requestAnimationFrame(() => {
             renderTable();
             isRendering = false;
         });
     }

     // [2] 마켓 리스트 초기화
     async function initMarketList() {
         const savedData = localStorage.getItem('upbit_markets');
         if (!savedData) return;

         const markets = JSON.parse(savedData);
         const unit = unitSelect.value;
         const filtered = markets.filter(m => m.market.startsWith(unit));
         filtered.sort((a, b) => a.korean_name.localeCompare(b.korean_name));

         marketSelect.innerHTML = '<option value="ALL">전체 보기</option><option value="MY">관심 코인</option>';
         marketMap = {};

         filtered.forEach(m => {
             marketMap[m.market] = { korean: m.korean_name };
             const option = document.createElement('option');
             option.value = m.market;
             option.textContent = `${m.korean_name} (${m.market})`;
             marketSelect.appendChild(option);
         });

         connectWS(); // 초기 로드 후 소켓 연결
     }

     // [3] WebSocket 연결 및 데이터 수신
     function connectWS() {
         if (socket) {
             socket.close();
             currentTickers = {}; // 기존 데이터 초기화
         }

         const selected = marketSelect.value;
         let targetCodes = (selected === "ALL") ? Object.keys(marketMap) :
                          (selected === "MY") ? ["KRW-BTC", "KRW-ETH", "KRW-XRP"] : [selected];

         if (targetCodes.length === 0) return;

         socket = new WebSocket("wss://api.upbit.com/websocket/v1");
         socket.binaryType = 'blob';

         socket.onopen = () => {
             const query = [{ "ticket": "test" }, { "type": "ticker", "codes": targetCodes }];
             socket.send(JSON.stringify(query));
         };


         socket.onmessage = async (event) => {
             const text = await event.data.text();
             const data = JSON.parse(text);

             const prevData = currentTickers[data.code];
            if (prevData && prevData.trade_price !== data.trade_price) {
                changedMarkets.add(data.code); // 값이 변했다면 집합에 추가
               // 0.8초 후에 테두리 제거 (너무 짧으면 안 보임)
                setTimeout(() => {
                    changedMarkets.delete(data.code);
                    throttledRender();
                }, 800);
            }


             // 데이터 업데이트
             currentTickers[data.code] = data;

             // ⭐ 직접 renderTable() 대신 Throttle 함수 호출
             throttledRender();

             updateTime();
         };
     }

     // [4] 테이블 렌더링
     function renderTable() {
         const isKRW = unitSelect.value === "KRW-";
         const formatPrice = (val) => isKRW ? val.toLocaleString() : val;
         const sorted = Object.values(currentTickers).sort((a, b) => b.acc_trade_price_24h - a.acc_trade_price_24h);

         tableBody.innerHTML = sorted.map((item, index) => {

             const mInfo = marketMap[item.code] || { korean: item.code };
             const changeClass = item.change === 'RISE' ? 'positive' : item.change === 'FALL' ? 'negative' : 'even';
             const changeSymbol = item.change === 'RISE' ? '▲' : item.change === 'FALL' ? '▼' : '-';
             const highlightClass = changedMarkets.has(item.code) ? 'highlight-border' : '';

             return `
                 <tr data-id="${item.code}">
                     <td style="text-align:center;">${index + 1}</td>
                     <td class="market-click" style="text-align:left; cursor:pointer; color:blue;">${item.code.split('-')[1]}</td>
                     <td class="name-click" style="text-align:left; cursor:pointer; color:blue;">${mInfo.korean}</td>
                     <td style="text-align:right;" class="${changeClass}">${formatPrice(item.trade_price)}</td>
                     <td style="text-align:right;">${formatPrice(item.prev_closing_price)}</td>
                     <td style="text-align:right;" class="${changeClass}">${formatPrice(item.change_price)}</td>
                     <td style="text-align:right;" class="${changeClass}">${(item.signed_change_rate * 100).toFixed(2)}% ${changeSymbol}</td>
                     <td style="text-align:right;">${formatPrice(item.high_price)}</td>
                     <td style="text-align:right;">${formatPrice(item.low_price)}</td>
                     <td style="text-align:center;">${item.highest_52_week_date}</td>
                     <td style="text-align:right;">${formatPrice(item.highest_52_week_price)}</td>
                     <td style="text-align:center;">${item.lowest_52_week_date}</td>
                     <td style="text-align:right;">${formatPrice(item.lowest_52_week_price)}</td>
                     <td style="text-align:right;">${Math.round(item.acc_trade_price_24h / 1000000).toLocaleString()} 백만</td>
                     <td style="text-align:center;">${item.trade_time.replace(/^(\d{2})(\d{2})(\d{2})$/, '$1:$2:$3')}</td>
                 </tr>
             `;
         }).join('');
     }

     function updateTime() {
         const now = new Date();
         document.getElementById('lastUpdateTime').textContent = `실시간 업데이트 중 (${now.toLocaleTimeString()})`;
     }

     // [5] 버튼 및 셀렉트 박스 이벤트 재연결
     document.getElementById('btnSearch').addEventListener('click', connectWS);

     unitSelect.addEventListener('change', initMarketList);
     marketSelect.addEventListener('change', connectWS);

     // 팝업 이벤트 (이벤트 위임 활용)
     tableBody.addEventListener("dblclick", (e) => {
         const row = e.target.closest("tr");
         if (row) window.open(`orderbook.html?market=${row.dataset.id}`, `_blank`, 'width=600,height=1000');
     });

     tableBody.addEventListener("click", (e) => {
         if (e.target.classList.contains("market-click")) {
             const row = e.target.closest("tr");
             if (row) window.open(`orderbook.html?market=${row.dataset.id}`, `_blank`, 'width=600,height=1000')
         }
         if (e.target.classList.contains("name-click")) {
             const row = e.target.closest("tr");
             window.open(`candle.html?market=${row.dataset.id}`, `_blank`, 'width=900,height=1200');
         }
     });

     // Excel 버튼: 현재 테이블 데이터 추출 (간단한 예시)
    document.getElementById('btnExcel').addEventListener('click', () => {
        const table = document.getElementById("mainTable");
        let csv = "\ufeff"; // 한글 깨짐 방지 BOM
        for (let row of table.rows) {
            const cells = Array.from(row.cells).map(c => c.innerText.replace(/,/g, ""));
            csv += cells.join(",") + "\n";
        }
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "upbit_ticker.csv";
        link.click();
    });

     initMarketList();
 });
</script>
</body>
</html>
